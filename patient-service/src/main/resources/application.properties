spring.application.name=patient-service

spring.datasource.url=jdbc:mysql://mysql:3306/healthcare_patient_db?createDatabaseIfNotExist=true
#spring.datasource.url=jdbc:mysql://mysql:3306/healthcare_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC

#spring.datasource.url=jdbc:mysql://mysql:3306/healthcare_db
spring.datasource.username=usr
spring.datasource.password=pwd
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate JPA
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.defer-datasource-initialization=true

# SQL init
spring.sql.init.mode=always
spring.sql.init.data-locations=classpath:patient-data.sql

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

logging.level.org.springframework.jdbc.datasource.init=DEBUG


