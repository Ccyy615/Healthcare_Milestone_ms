server:
  port: 8080
  error:
    include-message: always

logging:
  level:
    root: INFO
    org.springframework.web: DEBUG
    org.springframework.jdbc.datasource.init: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

---
spring:
  application:
    name: patient-service
  config:
    activate:
      on-profile: default
  datasource:
    url: jdbc:h2:mem:patient-db;DB_CLOSE_DELAY=-1;MODE=MYSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect
    defer-datasource-initialization: true
  sql:
    init:
      mode: always
      data-locations: classpath:patient-data.sql

---
spring:
  application:
    name: patient-service
  config:
    activate:
      on-profile: docker
  datasource:
    url: jdbc:mysql://mysql:3306/healthcare_db?createDatabaseIfNotExist=true
    username: usr
    password: pwd
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: create
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
    defer-datasource-initialization: true
  sql:
    init:
      mode: always
      data-locations: classpath:patient-data.sql

---
spring:
  application:
    name: patient-service
  config:
