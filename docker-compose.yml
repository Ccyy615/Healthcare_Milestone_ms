services:
  patient-db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: patient_root_pwd
      MYSQL_DATABASE: patient_service
      MYSQL_USER: patient_user
      MYSQL_PASSWORD: patient_pwd
    volumes:
      - patient_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-ppatient_root_pwd"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  doctor-db:
    image: postgres:16
    environment:
      POSTGRES_DB: doctor_service
      POSTGRES_USER: doctor_user
      POSTGRES_PASSWORD: doctor_pwd
    volumes:
      - doctor_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U doctor_user -d doctor_service"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  clinic-room-db:
    image: postgres:16
    environment:
      POSTGRES_DB: clinic_room_service
      POSTGRES_USER: clinic_room_user
      POSTGRES_PASSWORD: clinic_room_pwd
    volumes:
      - clinic_room_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clinic_room_user -d clinic_room_service"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  appointment-db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: appointment_root_pwd
      MYSQL_DATABASE: appointment_service
      MYSQL_USER: appointment_user
      MYSQL_PASSWORD: appointment_pwd
    volumes:
      - appointment_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-pappointment_root_pwd"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  patient-db-admin:
    image: adminer:latest
    expose:
      - "8080"
    environment:
      ADMINER_DEFAULT_SERVER: patient-db
    depends_on:
      patient-db:
        condition: service_healthy

  doctor-db-admin:
    image: adminer:latest
    expose:
      - "8080"
    environment:
      ADMINER_DEFAULT_SERVER: doctor-db
    depends_on:
      doctor-db:
        condition: service_healthy

  clinic-room-db-admin:
    image: adminer:latest
    expose:
      - "8080"
    environment:
      ADMINER_DEFAULT_SERVER: clinic-room-db
    depends_on:
      clinic-room-db:
        condition: service_healthy

  appointment-db-admin:
    image: adminer:latest
    expose:
      - "8080"
    environment:
      ADMINER_DEFAULT_SERVER: appointment-db
    depends_on:
      appointment-db:
        condition: service_healthy

  patient-service:
    build: ./patient-service
    environment:
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      patient-db:
        condition: service_healthy

  doctor-service:
    build: ./doctor-service
    environment:
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      doctor-db:
        condition: service_healthy

  clinic-room-service:
    build: ./clinic-room-service
    environment:
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      clinic-room-db:
        condition: service_healthy

  appointment-service:
    build: ./appointment-service
    environment:
      SPRING_PROFILES_ACTIVE: docker
      APPOINTMENT_DATASOURCE_URL: jdbc:mysql://appointment-db:3306/appointment_service?createDatabaseIfNotExist=true
      APPOINTMENT_DATASOURCE_USERNAME: appointment_user
      APPOINTMENT_DATASOURCE_PASSWORD: appointment_pwd
      PATIENT_SERVICE_URL: http://patient-service:8080
      DOCTOR_SERVICE_URL: http://doctor-service:8080
      CLINIC_ROOM_SERVICE_URL: http://clinic-room-service:8080
    depends_on:
      appointment-db:
        condition: service_healthy
      patient-service:
        condition: service_started
      doctor-service:
        condition: service_started
      clinic-room-service:
        condition: service_started

  apigateway-service:
    build: ./apigateway-service
    ports:
      - "8080:8080"
    environment:
      PATIENT_SERVICE_URL: http://patient-service:8080
      DOCTOR_SERVICE_URL: http://doctor-service:8080
      CLINIC_ROOM_SERVICE_URL: http://clinic-room-service:8080
      APPOINTMENT_SERVICE_URL: http://appointment-service:8080
    depends_on:
      patient-service:
        condition: service_started
      doctor-service:
        condition: service_started
      clinic-room-service:
        condition: service_started
      appointment-service:
        condition: service_started

volumes:
  patient_mysql_data:
  doctor_postgres_data:
  clinic_room_postgres_data:
  appointment_mysql_data:
